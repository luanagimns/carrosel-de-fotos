<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrossel de Fotos</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="carousel">

        <button class="prev">&#10094;</button>

        <div class="carousel-container">

            <img src="./assets/pc.JPEG" class="slide active">

            <img src="./assets/stardew.JPEG" class="slide">

            <img src="./assets/cafe.JPEG" class="slide">

            <img src="./assets/study.PNG" class="slide">

        </div>

        <button class="next">&#10095;</button>

    </div>

    <div class="dots">

        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>

    </div>

    <script src="script.js"></script>

</body>

</html>
